[componentInstances:cComponentManager]
instance[dataMemory].type=cDataMemory

;;;;;;;;;;;;;;;;;;;;;;;;;;;; External audio input ;;;;;;;;;;;;;;;;;;;;;;;;;;;

[componentInstances:cComponentManager]
instance[externalAudio].type=cExternalAudioSource

[externalAudio:cExternalAudioSource]
writer.dmLevel=wave
sampleRate=16000
channels=1
nBits=16
blocksize=100000
fieldName=pcm

;;;;;;;;;;;;;;;;;;;;;;;;;;;; Processing chain ;;;;;;;;;;;;;;;;;;;;;;;;;;;

[componentInstances:cComponentManager]
instance[fr25].type=cFramer
instance[fr40].type=cFramer
instance[w40].type=cWindower
instance[fft40].type=cTransformFFT
instance[fftmagphase40].type=cFFTmagphase
instance[acf40].type=cAcf
instance[cepstrum40].type=cAcf
instance[pitchACF].type=cPitchACF
instance[pe].type=cVectorPreemphasis
instance[win].type=cWindower
instance[fft].type=cTransformFFT
instance[fftmagphase].type=cFFTmagphase
instance[mspec].type=cMelspec
instance[mfcc].type=cMfcc
instance[lpc].type=cLpc
instance[lsp].type=cLsp
instance[mzcr].type=cMZcr
instance[intens].type=cIntensity
instance[lld].type=cContourSmoother
instance[delta1].type=cDeltaRegression
instance[functL1].type=cFunctionals

;;;;;;;;;;;;;;;;;;;;;;;;;;;; 25ms framing ;;;;;;;;;;;;;;;;;;;;;;;;;;;

[fr25:cFramer]
reader.dmLevel=wave
writer.dmLevel=frame25
frameSize = 0.025
frameStep = 0.010
frameCenterSpecial = left

;;;;;;;;;;;;;;;;;;;;;;;;;;;; 40ms framing ;;;;;;;;;;;;;;;;;;;;;;;;;;;

[fr40:cFramer]
reader.dmLevel=wave
writer.dmLevel=frame40
frameSize = 0.040
frameStep = 0.010
frameCenterSpecial = left

[w40:cWindower]
reader.dmLevel=frame40
writer.dmLevel=winframe40
winFunc = ham
gain = 1.0
offset = 0

[fft40:cTransformFFT]
reader.dmLevel=winframe40
writer.dmLevel=fftc40

[fftmagphase40:cFFTmagphase]
reader.dmLevel=fftc40
writer.dmLevel=fftmag40

[acf40:cAcf]
reader.dmLevel=fftmag40
writer.dmLevel=acf40
usePower = 1
cepstrum = 0
acfCepsNormOutput = 0

[cepstrum40:cAcf]
reader.dmLevel=fftmag40
writer.dmLevel=cepstrum40
usePower = 1
cepstrum = 1
acfCepsNormOutput = 0
absCepstrum = 1
oldCompatCepstrum = 1

[pitchACF:cPitchACF]
reader.dmLevel=cepstrum40;acf40
writer.dmLevel=pitch
processArrayFields = 0
maxPitch = 500
voiceProb = 1
voiceQual = 0
HNR = 0
F0raw = 0
F0env = 1
voicingCutoff = 0.550000

;;;;;;;;;;;;;;;;;;;;;;;;;;;; MFCC processing ;;;;;;;;;;;;;;;;;;;;;;;;;;;

[pe:cVectorPreemphasis]
reader.dmLevel=frame25
writer.dmLevel=frame25pe
k=0.97
de=0

[win:cWindower]
reader.dmLevel=frame25pe
writer.dmLevel=winframe25
winFunc = ham
gain = 1.0
offset = 0

[fft:cTransformFFT]
reader.dmLevel=winframe25
writer.dmLevel=fftc25

[fftmagphase:cFFTmagphase]
reader.dmLevel=fftc25
writer.dmLevel=fftmag25

[mspec:cMelspec]
reader.dmLevel=fftmag25
writer.dmLevel=mspec1
htkcompatible = 0
usePower = 1
lofreq = 0
hifreq = 8000
nBands = 26
specScale = mel
inverse = 0

[mfcc:cMfcc]
reader.dmLevel=mspec1
writer.dmLevel=mfcc1
copyInputName = 1
processArrayFields = 1
firstMfcc = 1
lastMfcc = 14
cepLifter = 22.0
htkcompatible = 0

;;;;;;;;;;;;;;;;;;;;;;;;;;;; LPC and LSP ;;;;;;;;;;;;;;;;;;;;;;;;;;;

[lpc:cLpc]
reader.dmLevel=frame25
writer.dmLevel=lpc
p=8
method = acf
saveLPCoeff = 1
lpGain = 0
saveRefCoeff = 1
residual = 0
forwardFilter = 0
lpSpectrum = 0

[lsp:cLsp]
reader.dmLevel=lpc
writer.dmLevel=lsp

;;;;;;;;;;;;;;;;;;;;;;;;;;;; Zero crossings ;;;;;;;;;;;;;;;;;;;;;;;;;;;

[mzcr:cMZcr]
reader.dmLevel=frame25pe
writer.dmLevel=mzcr
copyInputName = 1
processArrayFields = 1
zcr = 1
amax = 0
mcr = 0
maxmin = 0
dc = 0

;;;;;;;;;;;;;;;;;;;;;;;;;;;; Intensity ;;;;;;;;;;;;;;;;;;;;;;;;;;;

[intens:cIntensity]
reader.dmLevel=frame25
writer.dmLevel=intens
copyInputName = 1
processArrayFields = 1
intensity = 0
loudness = 1

;;;;;;;;;;;;;;;;;;;;;;;;;;;; LLD smoothing ;;;;;;;;;;;;;;;;;;;;;;;;;;;

[lld:cContourSmoother]
reader.dmLevel=intens;mfcc1;lsp;mzcr;pitch
writer.dmLevel=lld
writer.levelconf.nT = 10000
writer.levelconf.isRb=0
writer.levelconf.growDyn=1
nameAppend = sma
copyInputName = 1
noPostEOIprocessing = 0
smaWin = 3

;;;;;;;;;;;;;;;;;;;;;;;;;;;; Delta coefficients ;;;;;;;;;;;;;;;;;;;;;;;;;;;

[delta1:cDeltaRegression]
reader.dmLevel=lld
writer.dmLevel=lld_de
writer.levelconf.nT = 10000
writer.levelconf.isRb=0
writer.levelconf.growDyn=1
nameAppend = de
copyInputName = 1
noPostEOIprocessing = 0
deltawin=2

;;;;;;;;;;;;;;;;;;;;;;;;;;;; Functionals ;;;;;;;;;;;;;;;;;;;;;;;;;;;

[functL1:cFunctionals]
reader.dmLevel=lld;lld_de
writer.dmLevel=func
copyInputName = 1
frameMode = full
frameCenterSpecial = left
functionalsEnabled=Extremes;Regression;Moments;Percentiles
Extremes.max = 1
Extremes.min = 1
Extremes.range = 1
Extremes.maxpos = 1
Extremes.minpos = 1
Extremes.amean = 1
Extremes.maxameandist = 0
Extremes.minameandist = 0
Extremes.norm = frame
Regression.linregc1 = 1
Regression.linregc2 = 1
Regression.linregerrA = 1
Regression.linregerrQ = 1
Regression.qregc1 = 0
Regression.qregc2 = 0
Regression.qregc3 = 0
Regression.qregerrA = 0
Regression.qregerrQ = 0
Regression.centroid = 0
Regression.doRatioLimit = 0
Regression.centroidRatioLimit = 0
Moments.doRatioLimit = 0
Moments.variance = 0
Moments.stddev = 1
Moments.skewness = 1
Moments.kurtosis = 1
Moments.amean = 0
Percentiles.quartiles = 1
Percentiles.iqr = 1

;;;;;;;; External data sink for R ;;;;;;;;;;;;;;;;;;;;;

[componentInstances:cComponentManager]
instance[functionals].type=cExternalSink

[functionals:cExternalSink]
reader.dmLevel = func
